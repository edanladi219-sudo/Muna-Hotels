        </section>
    </header>

        <div class="room">
            <div class="box"><img src="./room/IMG_20260517_185939_911.png" alt=""></div>
            <p id="boot">ROOM 203 <span class="room-price-tag"></span> <button class="room-reserve-btn" data-room="203">Reserve</button></p>
        </div>

    <!-- Reservation Modal -->
    <div id="reservation-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Room Reservation - Standard Suites E Wing</h2>
            <form id="reservation-form">
                <div class="form-group">
                    <label for="room-display">Room</label>
                    <input type="text" id="room-display" readonly style="background-color: #f0f0f0; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="check-in">Check-in Date</label>
                    <input type="date" id="check-in" required>
                </div>
                <div class="form-group">
                    <label for="check-out">Check-out Date</label>
                    <input type="date" id="check-out" required>
                </div>
                <div class="form-group">
                    <label for="guests">Number of Guests</label>
                    <input type="number" id="guests" min="1" required>
                </div>
                <button type="submit" class="btn">Submit Reservation</button>
            </form>
            <p id="reservation-message"></p>
        </div>
    </div>

    <!-- Supabase Scripts (Required for reservation.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public/js/supabase-config.js"></script>
    <script src="reservation.js"></script>
    <script>
        // Global function for mobile menu toggle
        function toggleMobileMenu() {
            document.querySelector('header section').classList.toggle('active');
        }

        // Get room type and number from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        window.roomNumber = urlParams.get('room') || '203';
        window.roomType = urlParams.get('type') || 'STANDARD SUITES E WING';

        // Fetch dynamic price from Admin Dashboard
        async function updatePriceTags() {
            try {
                await window.ensureSupabaseReady();
                const { data, error } = await window.supabaseClient
                    .from('hotel_rooms')
                    .select('price_per_night')
                    .eq('room_type', window.roomType)
                    .limit(1)
                    .single();
                
                if (error) throw error;
                
                if (data) {
                    const tags = document.querySelectorAll('.room-price-tag');
                    tags.forEach(tag => {
                        tag.textContent = `₦${parseFloat(data.price_per_night).toLocaleString()}`;
                    });
                }
            } catch (err) {
                console.error('❌ Price Fetch Error:', err.message);
            }
        }
        
        document.addEventListener('DOMContentLoaded', updatePriceTags);
    </script>
</body>
</html>
