<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MunaHotels</title>
    <link rel="stylesheet" href="muna.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="./images/logo.png" alt="MunaHotels Logo">MunaHotels
        </div>
        <section>
            <a href="home.html">HOME</a>
            <a href="#contacts">CONTACT</a>
            <a href="">RESTAURANT</a>
            <a href="">HALLS</a>
        </section>
    </header>

    <div class="container">
        <div class="form-container">
            <div class="form-toggle">
                <button id="login-toggle" class="active">Login</button>
                <button id="signup-toggle">Sign Up</button>
            </div>

            <form id="login-form" class="form">
                <h2>Login</h2>
                <div class="form-group">
                    <label for="login-email">Email or Username</label>
                    <input type="text" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <p id="login-message"></p>
            </form>

            <form id="signup-form" class="form hidden">
                <h2>Sign Up</h2>
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required>
                </div>
                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" required>
                </div>
                <button type="submit" class="btn">Sign Up</button>
                <p id="signup-message"></p>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
